# promt colors I used:
# #06969A (petrol)
# #86BBD8 (light blue)
# #33658A (dark blue)
# #DA627D (petrol red)
# #FCA17D (apreco)
# #9A348E (purple)

format = """
[Óā∂](#9A348E)\
$os\
$username\
[Óāį](bg:#DA627D fg:#9A348E)\
$directory\
[Óāį](fg:#DA627D bg:#FCA17D)\
$git_state\
[Óāį](fg:#FCA17D bg:#86BBD8)\
$git_branch\
$git_status\
[Óāį](fg:#86BBD8 bg:#06969A)\
$kubernetes\
[Óāī](fg:#06969A)\
$fill\
[Óā∂](fg:black)\
$status\
[Óā≤](fg:#86BBD8 bg:black)\
$nodejs\
$azure\
$python\
$terraform\
$lua\
$rust\
$uv_python\
[Óā≤](fg:#06969A bg:#86BBD8)\
$openstack\
$cmd_duration\
[Óā≤](fg:#33658A bg:#06969A)\
$time\
[Óāī](fg:#33658A)\
$line_break\
$character
"""

command_timeout = 500

[fill]
symbol = "¬∑"

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like ÔĄ†  or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#9A348E"
disabled = true # Disabled by default

[directory]
style = "bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 100
truncation_symbol = "‚Ä¶/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Downloads" = "ÔÄô "
"Music" = "ůįĚö "
"Pictures" = "ÔÄĺ "
"Movies" = "ůįüě "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ůįąôÔĄ™ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ůįąô " = " ůįąôÔĄ™ "

[c]
symbol = "Óėě "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "ÔĆą "
style = "bg:#06969A"
format = '[ $symbol $context ]($style) $path'

[elixir]
symbol = "ÓČĶ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "Óė¨ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

# [git_state]
# format = '[\($state( $progress_current of $progress_total)\)]($style) '
# cherry_pick = '[ūüćí PICKING](bold red)'
#
[git_branch]
symbol = "Ôźė"
style = "bg:#86BBD8"
format = '[ $symbol $branch ]($style)'

# [git_status]
# style = "bg:#FCA17D"
# untracked = ""
# format = '([\[$conflicted$deleted$renamed$modified$staged$behind\]]($style))'
# modified = '*'
# # format = '[$all_status$ahead_behind ]($style)'
[git_status]
ahead = "‚á°${count} "
diverged = "‚áē‚á°${ahead_count}‚á£${behind_count} "
behind = "‚á£${count} "
modified = '[!$count](bg:#86BBD8) '
staged = "+${count} "
untracked = "?${count} "
stashed = 'ūüď¶ ${count} '
up_to_date = '[‚úď](green bg:#86BBD8) '
style = "bg:#86BBD8"
format = "[$all_status$ahead_behind]($style)"

[golang]
symbol = "Óėß "
style = "bg:#86BBD8"
format = '[ $symbol($version) ]($style)'

[kubernetes]
disabled = false
style = "bg:#06969A"
format = '[ $symbol$context ]($style)'

[rust]
symbol = "Óě®"
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%T" # Hour:Minute Format
style = "bg:#33658A"
format = '[ $time ]($style)'

[azure]
disabled = false
format = 'on [$symbol($subscription)]($style) '
symbol = 'ÓĮė '
style = "bg:#86BBD8"

[lua]
format = '[$symbol($version )]($style)'
style = "bg:#86BBD8"

[openstack]
format = '[$symbol$cloud(\($project\))]($style)'
style = "bg:#06969A"
# symbol = '‚ėĀÔłŹ '
symbol = 'ůįÖü '

[terraform]
format = '[$symbol($version )]($style)'
style = "bg:#86BBD8"
symbol = 'ůĪĀĘ '

[python]
style = "bg:#86BBD8"
pyenv_version_name = false
format = '[${symbol}${version}]($style)'

[cmd_duration]
style = "bg:#06969A"
# style = "bg:#86BBD8"
format = '[‚ŹĪ $duration]($style)'

[status]
disabled = false
style = "bg:#000000"
success_symbol = "[‚úĒ](green bg:black)"
symbol = "[‚úė](red bg:black)"
format = '[$symbol$common_meaning$signal_name$maybe_int]($style)'

[custom.uv_python]
command = 'uv python find --show-version'
format = 'via [${symbol}(${output} )]($style)'
symbol = "uv "
detect_extensions = ['py', 'ipynb']
detect_files = ['.python-version', 'Pipfile', '__init__.py', 'pyproject.toml', 'requirements.txt', 'setup.py', 'tox.ini', 'uv.lock', 'pylock.toml']
style = "bold purple"
